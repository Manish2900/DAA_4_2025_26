<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinding Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Pathfinding Visualizer</h1>
            
            <div class="controls">
                <div class="control-group">
                    <button id="btn-bfs" class="btn primary">Run BFS</button>
                    <button id="btn-dijkstra" class="btn primary">Run Dijkstra</button>
                    <button id="btn-astar" class="btn primary">Run A*</button>
                </div>
                <div class="control-group">
                    <button id="btn-draw-wall" class="btn secondary" style="border: 2px solid white;">Draw Walls</button>
                    <button id="btn-draw-weight" class="btn secondary">Draw Weights</button>
                </div>
                <div class="control-group">
                    <button id="btn-clear" class="btn secondary">Clear Grid</button>
                    <button id="btn-clear-path" class="btn secondary">Clear Path</button>
                </div>
            </div>

            <div class="stats">
                <div class="stat-box">
                    <span class="stat-label">Visited Nodes</span>
                    <span id="stat-visited" class="stat-value">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Path Length</span>
                    <span id="stat-path" class="stat-value">0</span>
                </div>
            </div>

            <div class="legend">
                <div class="legend-item"><div class="node start"></div><span>Start</span></div>
                <div class="legend-item"><div class="node end"></div><span>End</span></div>
                <div class="legend-item"><div class="node wall"></div><span>Wall</span></div>
                <div class="legend-item"><div class="node weight-example"></div><span>Weight (10)</span></div>
                <div class="legend-item"><div class="node visited-example"></div><span>Visited</span></div>
                <div class="legend-item"><div class="node path-example"></div><span>Path</span></div>
            </div>
        </header>

        <main class="grid-container">
            <div id="grid" class="grid"></div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
